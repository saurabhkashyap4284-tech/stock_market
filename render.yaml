services:
  # ── Unified Backend Service (API + Worker + Beat) ────────────────
  - type: web
    name: fo-monitor-api
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --no-input
    # Move migrations to startCommand because preDeployCommand is not free
    startCommand: |
      cd backend
      python manage.py migrate --no-input
      python manage.py runserver 0.0.0.0:$PORT &
      celery -A config.celery worker --loglevel=info --pool=solo &
      celery -A config.celery beat --loglevel=info &
      wait -n
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: fo-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── React Frontend (Static Site) ──────────────────────────────
  - type: web
    name: fo-monitor-ui
    runtime: static
    # plan: free # Static sites on Render are free by default and don't need this field
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fo-monitor-api
          property: host # Changed from url to host
          # Note: We'll handle the https:// prefix in the code or use a clever envVar trick

  # ── Render Key Value (Redis) ──────────────────────────────────
  - type: keyvalue
    name: fo-redis
    region: singapore
    plan: free
    ipAllowList: [] # Mandatory field

databases:
  # ── Render Postgres ──────────────────────────────────────────
  - name: fo-db
    plan: free
    region: singapore
