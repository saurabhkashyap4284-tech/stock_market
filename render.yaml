services:
  # ── Django Web Service (API + WebSockets) ───────────────────────
  - type: web
    name: fo-monitor-api
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --no-input
    preDeployCommand: cd backend && python manage.py migrate --no-input
    startCommand: cd backend && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fo-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── Celery Worker ───────────────────────────────────────────────
  - type: worker
    name: fo-monitor-worker
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A config.celery worker --loglevel=info --pool=solo
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fo-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── Celery Beat ────────────────────────────────────────────────
  - type: worker
    name: fo-monitor-beat
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A config.celery beat --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: fo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fo-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── React Frontend (Static Site) ──────────────────────────────
  - type: web
    name: fo-monitor-ui
    runtime: static # Mandatory for static sites in 2026 Render Blueprints
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist # Updated field name
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fo-monitor-api
          property: url

databases:
  - name: fo-db
    plan: free
    region: singapore

redis:
  - name: fo-redis
    plan: free
    region: singapore
