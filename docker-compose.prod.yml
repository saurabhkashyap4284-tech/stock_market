version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-fo_monitor}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fo_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - fo_network

  web:
    build: ./backend
    restart: always
    # Using Daphne for both HTTP and WebSockets
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
    networks:
      - fo_network

  celery_worker:
    build: ./backend
    restart: always
    command: celery -A config.celery worker --loglevel=info --pool=solo
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
    networks:
      - fo_network

  celery_beat:
    build: ./backend
    restart: always
    command: celery -A config.celery beat --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
    networks:
      - fo_network

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/staticfiles:/app/staticfiles:ro
    depends_on:
      - web
    networks:
      - fo_network

networks:
  fo_network:
    driver: bridge

volumes:
  postgres_data:
