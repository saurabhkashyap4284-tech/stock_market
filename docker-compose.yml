version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15
    environment:
      POSTGRES_DB:       fo_monitor
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fo_network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - fo_network
    volumes:
      - redis_data:/data

  # ── Django (ASGI via Daphne) ─────────────────────────────────
  web:
    build: ./backend
    # Using Daphne for both HTTP and WebSockets in production
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
    networks:
      - fo_network

  # ── Celery Worker ─────────────────────────────────────────────
  celery_worker:
    build: ./backend
    command: celery -A config.celery worker --loglevel=info --pool=solo
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
    networks:
      - fo_network

  # ── Celery Beat ───────────────────────────────────────────────
  celery_beat:
    build: ./backend
    command: celery -A config.celery beat --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
    networks:
      - fo_network

  # ── React Frontend (Static Build serving via Nginx) ───────────
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - fo_network

networks:
  fo_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: